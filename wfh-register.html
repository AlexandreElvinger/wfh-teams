<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>WFH Registration</title>
    <script src="https://res.cdn.office.net/teams-js/2.31.1/js/MicrosoftTeams.min.js"></script>
    <style>
        * { margin: 0; padding: 0; }
        html, body { height: 100%; font-family: Segoe UI, sans-serif; }
        .center {
            display: flex; flex-direction: column; justify-content: center;
            align-items: center; height: 100%; color: #444; gap: 16px;
        }
        button {
            background: #5B5FC7; color: white; border: none; padding: 12px 32px;
            border-radius: 4px; font-size: 15px; cursor: pointer;
        }
        button:hover { background: #4B4FB7; }
        p { font-size: 14px; color: #888; max-width: 400px; text-align: center; }
    </style>
</head>
<body>
    <div class="center" id="main">
        <p id="msg">Connecting...</p>
        <button id="btn" style="display:none;" onclick="go()">Open WFH Registration</button>
    </div>
    <script>
        var targetUrl = 'https://elvinger.sharepoint.com/SitePages/WFH-Registration.aspx';

        microsoftTeams.app.initialize().then(function() {
            microsoftTeams.app.notifySuccess();
            document.getElementById('msg').textContent = 'Click below to open WFH Registration';
            document.getElementById('btn').style.display = 'block';
        });

        function go() {
            document.getElementById('msg').textContent = 'Loading...';
            document.getElementById('btn').style.display = 'none';
            window.open(targetUrl, '_self');
        }
    </script>
</body>
</html>
