<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>WFH Calendar</title>
    <script src="https://res.cdn.office.net/teams-js/2.31.1/js/MicrosoftTeams.min.js"></script>
    <style>
        body { font-family: Segoe UI, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; color: #444; }
    </style>
</head>
<body>
    <div id="status">Loading...</div>
    <script>
        var status = document.getElementById('status');
        var targetUrl = 'https://elvinger.sharepoint.com/Lists/WFH%20Tracker/WFH%20Calendar%20View.aspx';
        var authUrl = 'https://elvinger.sharepoint.com/_layouts/15/teamslogon.aspx?spfx=true&dest=' + encodeURIComponent(targetUrl);

        microsoftTeams.app.initialize().then(function() {
            microsoftTeams.app.notifySuccess();
            status.textContent = 'Connecting to SharePoint...';

            var authFrame = document.createElement('iframe');
            authFrame.style.display = 'none';
            authFrame.src = authUrl;
            document.body.appendChild(authFrame);

            authFrame.onload = function() {
                setTimeout(function() {
                    window.location.replace(targetUrl);
                }, 1000);
            };

            setTimeout(function() {
                window.location.replace(targetUrl);
            }, 5000);
        });
    </script>
</body>
</html>
